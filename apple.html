<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Store Clone</title>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="./style/a.css">
    
</head>
<body>
    <section class="popular-product-container">
        <button class="arrow left" id="prevBtn">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="iphone-card-header">
            <div class="iphone-card">
                <div class="text">
                    <span>NEW</span>
                    <h2>iPhone 17 Pro</h2>
                    <p>179,800円から 、または4,994円/月月額の36回払いから 脚注 ‡</p>
                </div>

                <img src="./images/人気-1.jpg" alt="">
            </div>

            <div class="iphone-card">
                <div class="text">
                    <span>NEW</span>
                    <h2>iPhone 17 Pro</h2>
                    <p>179,800円から 、または4,994円/月月額の36回払いから 脚注 ‡</p>
                </div>

                <img src="./images/人気-1.jpg" alt="">
            </div>
        </div>

        <button class="arrow right" id="nextBtn">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
        
    </section>


<script src="./javascript/apple.js"></script>
</body>
</html>
